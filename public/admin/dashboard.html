<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ParkFinder</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">

  <nav class="bg-blue-600 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between">
      <h1 class="text-2xl font-bold">🚗 ParkFinder - Admin</h1>
      <button onclick="logout()" class="bg-white text-blue-600 px-4 py-2 rounded-lg">Logout</button>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-6">
    <h2 class="text-3xl font-bold mb-8">Add New Parking Location</h2>

    <form id="addParkingForm" class="bg-white p-8 rounded-2xl shadow">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block mb-2">Parking Name</label>
          <input type="text" id="name" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
          <label class="block mb-2">City</label>
          <input type="text" id="city" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div class="md:col-span-2">
          <label class="block mb-2">Full Address</label>
          <input type="text" id="address" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
          <label class="block mb-2">Total Slots</label>
          <input type="number" id="total_slots" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
          <label class="block mb-2">Price per Hour (₹)</label>
          <input type="number" id="price_per_hour" required class="w-full px-4 py-3 border rounded-lg">
        </div>
      </div>

      <button type="submit" 
              class="mt-8 w-full bg-green-600 text-white py-4 rounded-xl text-lg font-semibold hover:bg-green-700">
        Add Parking Location
      </button>
    </form>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
