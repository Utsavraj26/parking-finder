<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ParkFinder</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">

  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-600">🚗 ParkFinder</h1>
        <p class="text-gray-600 mt-2">Login to your account</p>
      </div>

      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Email</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-blue-500">
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Password</label>
          <input type="password" id="password" required
                 class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-blue-500">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
          Login
        </button>
      </form>

      <p class="text-center mt-6 text-gray-600">
        Don't have an account? 
        <a href="/register.html" class="text-blue-600 hover:underline">Register</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
