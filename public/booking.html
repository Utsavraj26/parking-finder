<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Parking - ParkFinder</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">

  <nav class="bg-blue-600 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">🚗 ParkFinder</h1>
      <button onclick="logout()" class="bg-white text-blue-600 px-4 py-2 rounded-lg text-sm">Logout</button>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto p-6">
    <h2 class="text-3xl font-bold mb-8">Complete Your Booking</h2>

    <div id="parkingDetails" class="bg-white rounded-2xl shadow p-8 mb-8">
      <!-- Parking details loaded by JS -->
    </div>

    <form id="bookingForm" class="bg-white rounded-2xl shadow p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block mb-2">Date</label>
          <input type="date" id="booking_date" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
          <label class="block mb-2">Start Time</label>
          <input type="time" id="start_time" required class="w-full px-4 py-3 border rounded-lg">
        </div>
        <div>
          <label class="block mb-2">End Time</label>
          <input type="time" id="end_time" required class="w-full px-4 py-3 border rounded-lg">
        </div>
      </div>

      <button type="submit" 
              class="mt-8 w-full bg-blue-600 text-white py-4 rounded-xl text-lg font-semibold hover:bg-blue-700">
        Confirm Booking
      </button>
    </form>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
