<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Parking - ParkFinder</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">

  <nav class="bg-blue-600 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">🚗 ParkFinder</h1>
      <div class="flex items-center gap-4">
        <a href="/dashboard.html" class="hover:underline">Dashboard</a>
        <button onclick="logout()" class="bg-white text-blue-600 px-4 py-2 rounded-lg text-sm font-medium">Logout</button>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6">
    <h2 class="text-3xl font-bold mb-6">Find Parking Spots</h2>

    <div class="mb-6">
      <input type="text" id="searchInput" placeholder="Search by area or city..." 
             class="w-full px-5 py-4 border rounded-xl text-lg focus:outline-none focus:border-blue-500">
    </div>

    <div id="parkingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Parking cards will be loaded here by JavaScript -->
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/parking.js"></script>
</body>
</html>
